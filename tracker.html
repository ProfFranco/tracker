<style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600;700&display=swap');

    .tracker-wrapper {
        font-family: 'Source Sans 3', 'Segoe UI', system-ui, sans-serif;
        display: block;
        width: 100%;
    }

    .tracker-wrapper * {
        /* Palette CHECK — thème sombre */
        --bg:           #1a1814;
        --surface:      #242018;
        --card:         #2a261e;
        --border:       #3a3428;
        --border-dark:  #4a4438;
        --text:         #e8e4dc;
        --text-muted:   #9e9a90;
        --text-dim:     #6b675f;
        --accent:       #5b9bd5;
        --accent-bg:    rgba(91,155,213,0.12);
        --success:      #7bc67e;
        --success-bg:   rgba(123,198,126,0.10);
        --warning:      #e8a838;
        --warning-bg:   rgba(232,168,56,0.10);
        --danger:       #d06050;
        --danger-bg:    rgba(208,96,80,0.10);
        --violet:       #a882c8;
        --radius:       8px;
        --shadow:       0 1px 3px rgba(0,0,0,0.25);
        box-sizing: border-box;
        font-family: inherit;
        margin: 0;
        padding: 0;
        line-height: 1.5;
    }

    .correction-card {
        background-color: var(--card);
        color: var(--text);
        padding: 28px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        max-width: 800px;
        margin: 15px auto;
    }

    .correction-card h2 {
        font-family: 'Lora', Georgia, serif;
        color: var(--text);
        text-align: center;
        margin-bottom: 24px;
        font-size: 1.55em;
        font-weight: 600;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 16px;
    }

    .correction-card h2 .ds-number {
        color: var(--accent);
        font-style: italic;
    }

    .correction-card hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 16px 0;
    }

    .header-indicators {
        display: flex;
        justify-content: space-around;
        align-items: stretch;
        gap: 12px;
        padding: 4px 0 20px 0;
    }

    @media (max-width: 600px) {
        .header-indicators {
            flex-direction: column;
            align-items: center;
        }
        .stat-box, .mood-box {
            width: 90%;
            max-width: 350px;
        }
    }

    .stat-box {
        text-align: center;
        padding: 14px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-width: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--surface);
        flex-grow: 1;
        gap: 4px;
    }

    .stat-box p {
        margin: 0;
        font-size: 0.82em;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
    }

    .stat-value {
        font-family: 'Source Code Pro', monospace;
        font-size: 2.1em;
        font-weight: 600;
        color: var(--accent);
        line-height: 1.15;
    }

    .stat-box .stat-sub {
        font-family: 'Source Code Pro', monospace;
        font-size: 0.95em;
        color: var(--text-muted);
    }

    .mood-box {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 14px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-width: 140px;
        background-color: var(--surface);
        flex-grow: 1;
        gap: 4px;
        transition: border-color 0.4s ease;
    }

    .mood-icon-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }

    #current-mood-icon {
        font-size: 2em;
        line-height: 1;
    }

    #current-mood-text {
        font-weight: 600;
        font-size: 0.95em;
        color: var(--text);
    }

    .mood-label {
        font-size: 0.82em;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 500;
    }

    /* ─── Frise chronologique ─────────────────────────────────────── */
    .timeline-container {
        position: relative;
        padding: 16px 0 24px;
    }

    .timeline-steps {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        position: relative;
        z-index: 2;
    }

    .step-title {
        font-size: 0.75em;
        color: var(--text-muted);
        padding: 0 3px;
        line-height: 1.3;
        margin-top: 8px;
    }

    @media (max-width: 600px) {
        .step-title { font-size: 0.68em; }
    }

    .timeline-item {
        width: 17%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .step-icon {
        font-size: 1.1em;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background-color: var(--surface);
        border: 2px solid var(--border-dark);
        color: var(--text-dim);
        position: relative;
        transition: border-color 0.3s ease, color 0.3s ease;
    }

    .timeline-item.completed .step-icon {
        border-color: var(--success);
        color: var(--success);
        background-color: var(--success-bg);
    }

    .timeline-item.active .step-icon {
        border-color: var(--accent);
        color: var(--accent);
        background-color: var(--accent-bg);
        box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .timeline-item.completed .step-title,
    .timeline-item.active .step-title {
        color: var(--text);
    }

    .step-arrow {
        font-size: 0.9em;
        color: var(--border-dark);
        flex-grow: 1;
        text-align: center;
        margin: 0 2px;
        padding-top: 13px;
        transition: color 0.4s ease;
    }

    .step-arrow.completed {
        color: var(--success);
    }

    /* ─── Date de retour ──────────────────────────────────────────── */
    .return-date-info {
        border: 1px solid var(--border-dark);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        background-color: var(--surface);
        text-align: center;
        font-size: 1.05em;
        color: var(--text-muted);
        padding: 12px 16px;
        margin-top: 20px;
    }

    .return-date-value {
        font-family: 'Source Code Pro', monospace;
        color: var(--accent);
        font-weight: 600;
        margin-left: 6px;
    }

    /* ─── Citation ────────────────────────────────────────────────── */
    .quote-text {
        text-align: center;
        font-family: 'Lora', Georgia, serif;
        font-style: italic;
        color: var(--text-dim);
        margin-top: 18px;
        margin-bottom: 8px;
        padding: 0 24px;
        font-size: 0.92em;
        line-height: 1.55;
    }

    /* ─── Boutons ─────────────────────────────────────────────────── */
    .button-group {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
    }

    .btn {
        padding: 9px 18px;
        border-radius: var(--radius);
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        font-size: 0.92em;
        transition: background-color 0.2s, opacity 0.2s;
        text-align: center;
        border: 1px solid var(--border-dark);
        background: var(--surface);
        color: var(--text);
    }

    .report-btn {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #fff;
        flex-grow: 1;
    }

    .report-btn:not([disabled]):hover {
        opacity: 0.88;
    }

    .report-btn[disabled] {
        background-color: var(--surface);
        border-color: var(--border);
        color: var(--text-dim);
        cursor: not-allowed;
    }

    .remarks-btn {
        background-color: transparent;
        border: 1px solid var(--border-dark);
        color: var(--text-muted);
        flex-grow: 1;
    }

    .remarks-btn:hover:not(.hidden) {
        background-color: var(--surface);
        color: var(--text);
    }

    .hidden { display: none !important; }

    /* ─── Zone remarques ──────────────────────────────────────────── */
    .remarks-area {
        margin-top: 14px;
        padding: 14px 16px;
        background-color: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        font-size: 0.9em;
    }

    .remarks-area.important-bg {
        background-color: var(--warning-bg);
        border-color: var(--warning);
    }

    .remarks-area.error {
        border-color: var(--danger);
        background-color: var(--danger-bg);
    }

    .remarks-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    .remarks-list li {
        margin-bottom: 8px;
        padding: 6px 10px;
        border-left: 3px solid var(--accent);
        color: var(--text);
        line-height: 1.4;
        background: rgba(91,155,213,0.05);
        border-radius: 0 var(--radius) var(--radius) 0;
    }

    .remarks-list li strong {
        color: var(--accent);
    }

    .remarks-list li.important {
        border-left-color: var(--warning);
        background: var(--warning-bg);
        color: var(--warning);
        font-weight: 600;
    }

    .remarks-list li.important strong {
        color: var(--warning);
    }

    .remarks-area.error .remarks-list li {
        border-left-color: var(--danger);
        background: var(--danger-bg);
        color: var(--danger);
    }

    .remarks-area.error .remarks-list li strong {
        color: var(--danger);
    }
</style>

<div class="tracker-wrapper">
    <div class="correction-card">
        <h2>DS n°<span id="ds-number" class="ds-number">[X]</span> — Suivi de correction</h2>

        <div class="header-indicators">
            <div class="stat-box average-gauge">
                <p>Moyenne de classe</p>
                <span id="current-average" class="stat-value">--</span>
            </div>

            <div id="mood-box" class="mood-box">
                <div class="mood-icon-container">
                    <span id="current-mood-icon">…</span>
                    <p id="current-mood-text">…</p>
                </div>
                <p class="mood-label">Humeur du correcteur</p>
            </div>

            <div class="stat-box copies-gauge">
                <p>Copies corrigées</p>
                <span id="corrected-count" class="stat-value">--</span>
                <span id="total-count" class="stat-sub">/--</span>
            </div>
        </div>

        <div class="timeline-container">
            <div id="timeline-steps" class="timeline-steps"></div>

            <div class="return-date-info">
                Date estimée de retour :
                <span id="estimated-return-date" class="return-date-value">--/--/--</span>
            </div>

            <div id="quote-display" class="quote-text"></div>

            <div id="remarks-area" class="remarks-area hidden"></div>

            <div class="button-group">
                <button id="remarks-button" class="btn remarks-btn hidden">
                    📢 Afficher les remarques sur le DS
                </button>
                <button id="report-button" class="btn report-btn" disabled="">
                    Télécharger le rapport
                </button>
            </div>
        </div>

        <script>
            // =================================================================
            // 1. CONFIGURATION
            // =================================================================
            const SHEET_ID = '1pKcYxUJtMthkJ9mN96LP4RzwTMoitBGs1b-1rw2aAMg';
            const GID_STATUT = '1069440488';
            const GID_REMARQUES = '143784605';

            const DEFAULT_SHEET_ID = 'VOTRE_ID_DE_FEUILLE_ICI';

            const GOOGLE_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_STATUT}`;
            const REMARKS_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_REMARQUES}`;

            // =================================================================
            // 2. CONSTANTES
            // =================================================================
            const CORRECTION_STEPS = [
                { title: "Rédaction du corrigé", icon: "📝" },
                { title: "Élaboration du barème", icon: "⚖️" },
                { title: "Copies test", icon: "🔍" },
                { title: "Correction des copies", icon: "🖍️" },
                { title: "Normalisation", icon: "📊" },
                { title: "Terminé", icon: "✅" }
            ];

            const MOODS = {
                "Motivé":       { icon: "😀" },
                "Concentré":    { icon: "🧠" },
                "Perplexe":     { icon: "🤔" },
                "Enthousiaste": { icon: "🥳" },
                "Épuisé":       { icon: "😴" },
                "Énervé":       { icon: "😡" },
                "Désespéré":    { icon: "😩" }
            };

            // =================================================================
            // 3. RÉCUPÉRATION DES DONNÉES
            // =================================================================
            async function fetchCurrentState() {
                try {
                    if (SHEET_ID === DEFAULT_SHEET_ID) throw new Error("Erreur de configuration : ID de feuille manquant.");
                    const url = GOOGLE_SHEET_URL + `&v=${Date.now()}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Erreur HTTP ${response.status}.`);
                    const csvText = await response.text();
                    const state = {};
                    csvText.trim().split('\n').forEach(line => {
                        const parts = line.split(',');
                        if (parts.length < 2) return;
                        const key = parts[0].trim();
                        const value = parts[1].trim();
                        if (!isNaN(value) && value !== '') {
                            state[key] = parseFloat(value);
                        } else if (value.toLowerCase() === 'true' || value.toLowerCase() === 'false') {
                            state[key] = value.toLowerCase() === 'true';
                        } else {
                            state[key] = value.replace(/^"|"$/g, '');
                        }
                    });
                    state.currentStepIndex = parseInt(state.currentStepIndex) || 0;
                    state.dsNumber = state.dsNumber || '[X]';
                    state.estimatedReturnDate = state.estimatedReturnDate || "--/--/--";
                    state.quoteText = state.quoteText || "Proverbe Shadok : quand on ne sait pas où l'on va, il faut y aller, et le plus vite possible !";
                    state.reportUrl = state.reportUrl || null;
                    return state;
                } catch (error) {
                    console.error("Échec du chargement.", error);
                    return {
                        totalCopies: '--', currentStepIndex: 0, copiesCorrigées: '--',
                        currentAverage: '--', dsNumber: '[X]', currentMood: "Désespéré",
                        hasRemarks: true, estimatedReturnDate: "--/--/--",
                        quoteText: "Erreur de chargement…",
                        remarksText: error.message, reportUrl: null, errorState: true
                    };
                }
            }

            async function fetchRemarksList() {
                try {
                    if (SHEET_ID === DEFAULT_SHEET_ID) return [{ title: "Non configuré", content: "ID de feuille manquant.", isImportant: true }];
                    const url = REMARKS_SHEET_URL + `&v=${Date.now()}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Erreur HTTP ${response.status}.`);
                    const csvText = await response.text();
                    const lines = csvText.trim().split('\n');
                    const dataLines = lines.length > 0 && lines[0].toLowerCase().includes('titre') ? lines.slice(1) : lines;
                    return dataLines.filter(l => l.trim()).map(line => {
                        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        if (parts.length >= 2) {
                            return {
                                title: parts[0].trim().replace(/^"|"$/g, ''),
                                content: parts[1].trim().replace(/^"|"$/g, ''),
                                isImportant: parts[2] ? parts[2].trim().toUpperCase().includes('IMPORTANT') : false
                            };
                        }
                        return null;
                    }).filter(Boolean);
                } catch (error) {
                    return [{ title: "Erreur", content: error.message, isImportant: true }];
                }
            }

            function downloadReport(reportUrl) {
                if (reportUrl) {
                    try { window.open(reportUrl, '_blank'); }
                    catch (e) { showReportError("Impossible d'ouvrir le lien du rapport."); }
                } else {
                    showReportError("Le rapport est prêt mais l'URL (<code>reportUrl</code>) est absente.");
                }
            }

            function showReportError(message) {
                const remarksArea = document.getElementById('remarks-area');
                remarksArea.classList.remove('hidden');
                remarksArea.classList.add('error');
                document.getElementById('remarks-button').classList.add('hidden');
                remarksArea.innerHTML = `<ul class="remarks-list"><li class="important"><strong>Avertissement :</strong> ${message}</li></ul>`;
            }

            // =================================================================
            // 4. MISE À JOUR DE L'INTERFACE
            // =================================================================
            function updateCorrectionDisplay(state, steps, moods, remarksList) {
                document.getElementById('ds-number').textContent = state.dsNumber;
                const avg = state.currentAverage;
                document.getElementById('current-average').textContent =
                    (avg !== '--' && avg !== 0) ? parseFloat(avg).toFixed(1) : '--';
                document.getElementById('corrected-count').textContent = state.copiesCorrigées;
                document.getElementById('total-count').textContent = `/${state.totalCopies || '--'}`;
                document.getElementById('estimated-return-date').textContent = state.estimatedReturnDate;
                document.getElementById('quote-display').textContent = state.quoteText;

                const moodData = moods[state.currentMood] || moods["Désespéré"];
                document.getElementById('current-mood-icon').textContent = state.errorState ? '❌' : moodData.icon;
                document.getElementById('current-mood-text').textContent = state.errorState ? 'Erreur' : (state.currentMood || "Chargement…");

                const moodBox = document.getElementById('mood-box');
                moodBox.style.borderColor = state.errorState ? 'var(--danger)' : 'var(--border)';

                const container = document.getElementById('timeline-steps');
                container.innerHTML = '';
                const maxStep = steps.length - 1;
                steps.forEach((step, index) => {
                    if (state.errorState && index > 0) return;
                    const isCompleted = index < state.currentStepIndex;
                    const isActive = index === state.currentStepIndex;
                    const div = document.createElement('div');
                    div.className = 'timeline-item' + (isCompleted ? ' completed' : '') + (isActive ? ' active' : '');
                    div.innerHTML = `<div class="step-icon">${step.icon}</div><p class="step-title">${step.title}</p>`;
                    container.appendChild(div);
                    if (index < maxStep && !state.errorState) {
                        const arrow = document.createElement('div');
                        arrow.className = 'step-arrow' + (isCompleted ? ' completed' : '');
                        arrow.textContent = '▶';
                        container.appendChild(arrow);
                    }
                });

                const reportButton = document.getElementById('report-button');
                const isFinished = state.currentStepIndex === steps.length - 1 && !state.errorState;
                if (isFinished && state.reportUrl) {
                    reportButton.removeAttribute('disabled');
                    reportButton.onclick = () => downloadReport(state.reportUrl);
                } else {
                    reportButton.setAttribute('disabled', 'true');
                    reportButton.onclick = null;
                    if (isFinished && !state.reportUrl) reportButton.textContent = "Lien du rapport manquant !";
                }

                const remarksButton = document.getElementById('remarks-button');
                const remarksArea = document.getElementById('remarks-area');
                remarksArea.classList.toggle('error', !!state.errorState);
                const hasImportant = remarksList.some(r => r.isImportant);
                remarksArea.classList.toggle('important-bg', hasImportant && !state.errorState);

                if (state.errorState) {
                    remarksArea.innerHTML = `<ul class="remarks-list"><li class="important"><strong>Erreur :</strong> ${state.remarksText}</li></ul>`;
                    remarksArea.classList.remove('hidden');
                    remarksButton.classList.add('hidden');
                } else if (remarksList.length > 0) {
                    let html = '<ul class="remarks-list">';
                    remarksList.forEach(r => {
                        html += `<li class="${r.isImportant ? 'important' : ''}"><strong>${r.title}</strong> : ${r.content}</li>`;
                    });
                    html += '</ul>';
                    remarksArea.innerHTML = html;
                    remarksButton.classList.remove('hidden');
                    remarksArea.classList.add('hidden');
                } else {
                    remarksButton.classList.add('hidden');
                    remarksArea.classList.add('hidden');
                }

                remarksButton.onclick = () => {
                    const hidden = remarksArea.classList.toggle('hidden');
                    remarksButton.innerHTML = hidden ? '📢 Afficher les remarques sur le DS' : '❌ Masquer les remarques sur le DS';
                };
            }

            // =================================================================
            // 5. INIT
            // =================================================================
            document.addEventListener('DOMContentLoaded', async () => {
                document.getElementById('current-mood-icon').textContent = MOODS["Concentré"].icon;
                document.getElementById('current-mood-text').textContent = "Chargement…";

                if (SHEET_ID === DEFAULT_SHEET_ID) {
                    updateCorrectionDisplay({
                        errorState: true,
                        remarksText: "Remplacez <code>SHEET_ID</code> par votre identifiant Google Sheet.",
                        dsNumber: '[X]', currentAverage: '--', copiesCorrigées: '--',
                        totalCopies: '--', estimatedReturnDate: "--/--/--",
                        currentStepIndex: 0, quoteText: "", reportUrl: null
                    }, CORRECTION_STEPS, MOODS, []);
                    return;
                }

                const currentState = await fetchCurrentState();
                let remarksList = [];
                if (!currentState.errorState && currentState.hasRemarks) {
                    remarksList = await fetchRemarksList();
                }
                updateCorrectionDisplay(currentState, CORRECTION_STEPS, MOODS, remarksList);
            });
        </script>
    </div>
</div>
