<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    .tracker-wrapper {
        font-family: 'Roboto', sans-serif;
        display: block;
        width: 100%;
    }

    .tracker-wrapper * {
        --card-bg: #2d3436;
        --main-color: #00cec9;
        --text-color: #dfe6e9;
        --disabled-color: #636e72;
        --error-color: #ff4757;
        box-sizing: border-box;
        font-family: inherit;
        margin: 0;
        padding: 0;
        line-height: 1.5;
    }

    .correction-card {
        background-color: var(--card-bg);
        color: var(--text-color);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 800px;
        margin: 15px auto;
    }

    .correction-card h2 {
        font-family: 'Orbitron', sans-serif;
        color: #fff;
        text-align: center;
        margin-bottom: 25px;
        text-shadow: 0 0 5px var(--main-color), 0 0 10px var(--main-color), 0 0 20px rgba(0, 206, 201, 0.7);
        font-size: 1.8em;
        letter-spacing: 3px;
        font-weight: 700;
    }

    .correction-card hr {
        border: none;
        border-top: 1px solid var(--disabled-color);
        margin: 15px 0;
    }

    .header-indicators {
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
        gap: 15px;
        padding: 10px 0 20px 0;
    }

    @media (max-width: 600px) {
        .header-indicators { flex-direction: column; align-items: center; }
        .stat-box, .mood-box { width: 90%; max-width: 350px; }
    }

    .stat-box {
        text-align: center;
        padding: 10px;
        border: 1px solid var(--disabled-color);
        border-radius: 8px;
        min-width: 150px;
        min-height: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: rgba(255, 255, 255, 0.02);
        flex-grow: 1;
    }

    .stat-box p {
        margin: 0;
        font-size: 1.1em;
        color: #fff;
        line-height: 1.2;
        text-shadow: 0 0 8px rgba(0, 206, 201, 0.6);
    }

    .stat-value {
        font-size: 2.2em;
        font-weight: bold;
        color: #fff;
        display: inline;
        margin-top: 5px;
    }

    .mood-box {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 15px;
        border: 1px solid var(--disabled-color);
        border-radius: 8px;
        min-width: 150px;
        background-color: #3b4347;
        transition: background-color 0.5s ease;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        min-height: 100px;
        flex-grow: 1;
    }

    .mood-icon-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 5px;
    }

    #current-mood-icon {
        font-size: 2.5em;
        line-height: 1;
        margin-bottom: 5px;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
    }

    #current-mood-text {
        font-weight: bold;
        font-size: 0.9em;
        margin: 0;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .mood-label {
        margin: 5px 0 0;
        font-size: 1.1em;
        color: #fff;
        font-weight: normal;
        text-shadow: 0 0 8px rgba(0, 206, 201, 0.6);
    }

    .timeline-container { position: relative; padding: 20px 0 30px; }

    .timeline-steps {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 2;
    }

    .step-title { font-size: 0.8em; padding: 0 5px; }
    @media (max-width: 600px) { .step-title { font-size: 0.7em; } }

    .timeline-item {
        width: 17%;
        text-align: center;
        opacity: 1;
        transition: opacity 0.5s ease;
    }

    .step-icon {
        font-size: 1.2em;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 10px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: var(--card-bg);
        border: 4px solid var(--disabled-color);
        color: var(--disabled-color);
        z-index: 5;
        position: relative;
        transition: all 0.3s ease;
    }

    .timeline-item.completed .step-icon { border-color: var(--main-color); color: var(--main-color); }
    .timeline-item.active .step-icon {
        border-color: var(--main-color);
        color: var(--main-color);
        box-shadow: 0 0 15px rgba(0, 206, 201, 0.9);
        transform: scale(1.1);
    }

    .step-arrow {
        font-size: 1.5em;
        color: var(--disabled-color);
        flex-grow: 1;
        text-align: center;
        margin: 0 5px;
        transition: color 0.5s ease, transform 0.5s ease;
    }
    .step-arrow.completed { color: var(--main-color); transform: scale(1.2); }

    .return-date-info {
        border: 2px solid var(--main-color);
        border-radius: 10px;
        background-color: rgba(0, 206, 201, 0.05);
        text-align: center;
        font-size: 1.3em;
        font-weight: bold;
        color: var(--text-color);
        padding: 15px 10px;
        margin-top: 20px;
        box-shadow: 0 0 10px rgba(0, 206, 201, 0.1);
    }

    .return-date-value {
        color: var(--main-color);
        margin-left: 5px;
        text-shadow: 0 0 5px rgba(0, 206, 201, 0.5);
    }

    .quote-text {
        text-align: center;
        font-style: italic;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 20px;
        margin-bottom: 10px;
        padding: 0 20px;
        font-size: 1em;
        line-height: 1.4;
    }

    .button-group {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 15px;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s, transform 0.2s, box-shadow 0.2s;
        text-align: center;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
    }

    .report-btn { background-color: var(--main-color); color: var(--card-bg); flex-grow: 1; }
    .report-btn:not([disabled]) {
        background-color: var(--main-color);
        color: #1a1a1a;
        font-size: 1.05em;
        box-shadow: 0 0 10px var(--main-color), 0 0 20px rgba(0, 206, 201, 0.5);
    }
    .report-btn:hover:not([disabled]) {
        background-color: #00b894;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #00b894, 0 5px 10px rgba(0, 0, 0, 0.5);
    }
    .report-btn[disabled] { background-color: var(--disabled-color); cursor: not-allowed; color: #fff; box-shadow: none; }

    .remarks-btn { background-color: transparent; border: 2px solid var(--main-color); color: var(--main-color); flex-grow: 1; }
    .remarks-btn:hover:not(.hidden) {
        background-color: var(--main-color);
        color: var(--card-bg);
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
    }

    .hidden { display: none !important; }

    .remarks-area { margin-top: 15px; padding: 15px; background-color: #3b4347; border-radius: 8px; font-size: 0.9em; }
    .remarks-area.important-bg { background-color: rgba(0, 206, 201, 0.1); border: 2px solid var(--main-color); }
    .remarks-area.error { border: 2px solid var(--error-color); background-color: rgba(255, 71, 87, 0.15); }
    .remarks-area.error .remarks-list li { color: var(--error-color); border-left-color: var(--error-color); }

    .remarks-list { list-style-type: none; padding: 0; margin: 0; }
    .remarks-list li { margin-bottom: 8px; padding-left: 10px; border-left: 3px solid var(--main-color); color: var(--text-color); line-height: 1.3; }
    .remarks-list li strong { color: #fff; }
    .remarks-list li.important { border-left-color: var(--error-color); color: var(--error-color); font-weight: bold; }

    @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .remarks-area:not(.hidden) { animation: fadeSlideIn 0.3s ease; }

    .last-updated { text-align: center; font-size: 0.75em; color: var(--disabled-color); margin-top: 10px; }

    @media print {
        .correction-card { box-shadow: none; background: white; color: black; border: 1px solid #ccc; }
        .correction-card h2 { text-shadow: none; color: black; }
        .button-group, .last-updated { display: none; }
        .step-icon { border-color: #333; color: #333; box-shadow: none; }
        .return-date-info { border-color: #333; background: none; box-shadow: none; }
    }
</style>

<div class="tracker-wrapper">
    <div class="correction-card">
        <h2>DS n°<span id="ds-number">[X]</span> - Suivi de Correction</h2>

        <div class="header-indicators">
            <div class="stat-box average-gauge">
                <p>Moyenne de Classe</p>
                <span id="current-average" class="stat-value">--</span>
            </div>
            <div id="mood-box" class="mood-box">
                <div class="mood-icon-container">
                    <span id="current-mood-icon">...</span>
                    <p id="current-mood-text">...</p>
                </div>
                <p class="mood-label">Humeur du correcteur</p>
            </div>
            <div class="stat-box copies-gauge">
                <p>Copies Corrigées</p>
                <span id="corrected-count" class="stat-value">--</span>
                <span id="total-count">/--</span>
            </div>
        </div>

        <div class="timeline-container">
            <div id="timeline-steps" class="timeline-steps"></div>
            <div class="return-date-info">
                Date estimée de retour des copies :
                <span id="estimated-return-date" class="return-date-value">--/--/--</span>
            </div>
            <div id="quote-display" class="quote-text"></div>
            <div id="remarks-area" class="remarks-area hidden"></div>
            <div class="button-group">
                <button id="remarks-button" class="btn remarks-btn hidden">
                    📢 Afficher les remarques sur le DS
                </button>
                <button id="report-button" class="btn report-btn" disabled="">
                    Télécharger le rapport
                </button>
            </div>
            <p id="last-updated" class="last-updated"></p>
        </div>

        <script>
            // =================================================================
            // 1. CONFIGURATION — source de données : GitHub Gist
            // =================================================================
            const GIST_USER = 'ProfFranco';
            const GIST_ID   = '092f02b8ae7c0edeffe8e68f9a5cb0c3';

            const STATUT_URL   = `https://gist.githubusercontent.com/${GIST_USER}/${GIST_ID}/raw/statut.csv`;
            const REMARQUES_URL = `https://gist.githubusercontent.com/${GIST_USER}/${GIST_ID}/raw/remarques.csv`;

            // =================================================================
            // 2. CONSTANTES
            // =================================================================
            const CORRECTION_STEPS = [
                { title: "Rédaction du corrigé",    icon: "📝" },
                { title: "Élaboration du barème",   icon: "⚖️" },
                { title: "Correction copies test",  icon: "🔍" },
                { title: "Correction des copies",   icon: "🖍️" },
                { title: "Normalisation des notes", icon: "📊" },
                { title: "Terminé",                 icon: "✅" }
            ];

            const MOODS = {
                "Motivé":      { icon: "😀", hue: 150 },
                "Concentré":   { icon: "🧠", hue: 120 },
                "Perplexe":    { icon: "🤔", hue: 60  },
                "Enthousiaste":{ icon: "🥳", hue: 90  },
                "Épuisé":      { icon: "😴", hue: 30  },
                "Énervé":      { icon: "😡", hue: 0   },
                "Désespéré":   { icon: "😩", hue: 0   }
            };

            const DEFAULT_LOADING_STATE = { currentMood: "Concentré", hue: 120 };

            // =================================================================
            // 3. UTILITAIRES
            // =================================================================
            function escapeHTML(str) {
                return String(str)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            // =================================================================
            // 4. CHARGEMENT DES DONNÉES
            // =================================================================
            async function fetchCurrentState() {
                try {
                    // Cache-buster : Gist peut mettre quelques minutes à propager
                    const url = STATUT_URL + `?v=${new Date().getTime()}`;
                    const response = await fetch(url);

                    if (!response.ok) {
                        throw new Error(`Erreur HTTP ${response.status}`);
                    }

                    const csvText = await response.text();
                    const lines = csvText.trim().split('\n');
                    const state = {};

                    lines.forEach(line => {
                        // split sur la première virgule uniquement
                        const idx = line.indexOf(',');
                        if (idx < 0) return;
                        const key   = line.slice(0, idx).trim();
                        const value = line.slice(idx + 1).trim().replace(/^"|"$/g, '');

                        if (value === 'true')  { state[key] = true;  return; }
                        if (value === 'false') { state[key] = false; return; }
                        const num = Number(value);
                        if (!isNaN(num) && value !== '' && String(num) === value) { state[key] = num; return; }
                        state[key] = value;
                    });

                    state.currentStepIndex = Math.max(0, Math.min(
                        parseInt(state.currentStepIndex) || 0,
                        CORRECTION_STEPS.length - 1
                    ));
                    state.dsNumber           = state.dsNumber           || '[X]';
                    state.estimatedReturnDate = state.estimatedReturnDate || '--/--/--';
                    state.quoteText          = state.quoteText          || "Proverbe Shadok : quand on ne sait pas où l'on va, il faut y aller, et le plus vite possible !";
                    state.reportUrl          = (state.reportUrl && /^https?:\/\//.test(state.reportUrl)) ? state.reportUrl : null;

                    try { localStorage.setItem('tracker_state_cache', JSON.stringify(state)); } catch(e) {}
                    return state;

                } catch (error) {
                    console.error("Échec du chargement STATUT :", error);

                    try {
                        const cached = localStorage.getItem('tracker_state_cache');
                        if (cached) {
                            const s = JSON.parse(cached);
                            s.fromCache = true;
                            return s;
                        }
                    } catch(e) {}

                    return {
                        totalCopies: '--', currentStepIndex: 0,
                        copiesCorrigées: '--', currentAverage: '--',
                        dsNumber: '[X]', currentMood: "Désespéré",
                        hasRemarks: false, estimatedReturnDate: '--/--/--',
                        quoteText: "Erreur de chargement...",
                        remarksText: `Échec de la connexion : ${error.message}`,
                        reportUrl: null, errorState: true
                    };
                }
            }

            async function fetchRemarksList() {
                try {
                    const url = REMARQUES_URL + `?v=${new Date().getTime()}`;
                    const response = await fetch(url);

                    if (!response.ok) {
                        throw new Error(`Erreur HTTP ${response.status}`);
                    }

                    const csvText = await response.text();
                    const lines = csvText.trim().split('\n');
                    // Ignorer la ligne d'en-tête si présente
                    const dataLines = (lines.length > 0 && lines[0].toLowerCase().includes('titre'))
                        ? lines.slice(1) : lines;

                    const remarksList = dataLines
                        .filter(line => line.trim().length > 0)
                        .map(line => {
                            const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            if (parts.length < 2) return null;
                            return {
                                title:       parts[0].trim().replace(/^"|"$/g, ''),
                                content:     parts[1].trim().replace(/^"|"$/g, ''),
                                isImportant: parts[2] ? parts[2].trim().toUpperCase().replace(/^"|"$/g, '').includes('IMPORTANT') : false
                            };
                        }).filter(r => r !== null);

                    try { localStorage.setItem('tracker_remarks_cache', JSON.stringify(remarksList)); } catch(e) {}
                    return remarksList;

                } catch (error) {
                    console.error("Échec du chargement REMARQUES :", error);
                    try {
                        const cached = localStorage.getItem('tracker_remarks_cache');
                        if (cached) return JSON.parse(cached);
                    } catch(e) {}
                    return [{ title: "Erreur", content: `Impossible de lire les remarques (${error.message})`, isImportant: true }];
                }
            }

            // =================================================================
            // 5. AFFICHAGE
            // =================================================================
            function updateCorrectionDisplay(state, steps, moods, remarksList) {
                document.getElementById('ds-number').textContent = state.dsNumber;
                const avg = (state.currentAverage !== '--' && state.currentAverage != null)
                    ? parseFloat(state.currentAverage).toFixed(1) : '--';
                document.getElementById('current-average').textContent = avg;
                document.getElementById('corrected-count').textContent = state.copiesCorrigées || '--';
                document.getElementById('total-count').textContent = `/${state.totalCopies || '--'}`;
                document.getElementById('estimated-return-date').textContent = state.estimatedReturnDate;
                document.getElementById('quote-display').textContent = state.quoteText;

                // Humeur
                const moodData = moods[state.currentMood] || moods["Désespéré"];
                document.getElementById('current-mood-icon').textContent = state.errorState ? '❌' : moodData.icon;
                document.getElementById('current-mood-text').textContent = state.errorState ? 'Erreur' : (state.currentMood || 'Chargement...');
                document.getElementById('mood-box').style.backgroundColor =
                    `hsl(${state.errorState ? 0 : moodData.hue}, 80%, 40%)`;

                // Frise
                const container = document.getElementById('timeline-steps');
                container.innerHTML = '';
                steps.forEach((step, index) => {
                    if (state.errorState && index > 0) return;
                    const isCompleted = index < state.currentStepIndex;
                    const isActive    = index === state.currentStepIndex;
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'timeline-item' + (isCompleted ? ' completed' : '') + (isActive ? ' active' : '');
                    stepDiv.innerHTML = `<div class="step-icon">${step.icon}</div><p class="step-title">${step.title}</p>`;
                    container.appendChild(stepDiv);
                    if (index < steps.length - 1 && !state.errorState) {
                        const arrow = document.createElement('div');
                        arrow.className = 'step-arrow' + (isCompleted ? ' completed' : '');
                        arrow.textContent = '▶';
                        container.appendChild(arrow);
                    }
                });

                // Bouton rapport
                const reportButton = document.getElementById('report-button');
                const isFinished = state.currentStepIndex === steps.length - 1 && !state.errorState;
                if (isFinished && state.reportUrl) {
                    reportButton.removeAttribute('disabled');
                    reportButton.onclick = () => window.open(state.reportUrl, '_blank');
                    reportButton.textContent = "Télécharger le rapport";
                } else {
                    reportButton.setAttribute('disabled', 'true');
                    reportButton.onclick = null;
                    reportButton.textContent = (isFinished && !state.reportUrl)
                        ? "Lien du rapport manquant !" : "Télécharger le rapport";
                }

                // Remarques
                const remarksButton = document.getElementById('remarks-button');
                const remarksArea   = document.getElementById('remarks-area');
                remarksArea.classList.toggle('error', !!state.errorState);
                remarksArea.classList.toggle('important-bg', !state.errorState && remarksList.some(r => r.isImportant));

                if (state.errorState) {
                    remarksArea.innerHTML = `<ul class="remarks-list"><li class="important"><strong>Erreur :</strong> ${escapeHTML(state.remarksText || '')}</li></ul>`;
                    remarksArea.classList.remove('hidden');
                    remarksButton.classList.add('hidden');
                } else if (remarksList.length > 0) {
                    remarksArea.innerHTML = '<ul class="remarks-list">' +
                        remarksList.map(r => `<li class="${r.isImportant ? 'important' : ''}"><strong>${escapeHTML(r.title)}</strong> : ${escapeHTML(r.content)}</li>`).join('') +
                        '</ul>';
                    remarksButton.classList.remove('hidden');
                    remarksArea.classList.add('hidden');
                    remarksButton.onclick = () => {
                        const hidden = remarksArea.classList.toggle('hidden');
                        remarksButton.innerHTML = hidden
                            ? '📢 Afficher les remarques sur le DS'
                            : '❌ Masquer les remarques sur le DS';
                    };
                } else {
                    remarksButton.classList.add('hidden');
                    remarksArea.classList.add('hidden');
                }
            }

            function updateLastUpdated(fromCache) {
                const el = document.getElementById('last-updated');
                if (!el) return;
                const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                el.textContent = fromCache
                    ? `⚠️ Données hors-ligne (cache du ${time})`
                    : `Dernière mise à jour : ${time}`;
                el.style.color = fromCache ? 'var(--error-color)' : 'var(--disabled-color)';
            }

            // =================================================================
            // 6. INIT & RAFRAÎCHISSEMENT
            // =================================================================
            function initializeDisplay() {
                const moodData = MOODS[DEFAULT_LOADING_STATE.currentMood];
                document.getElementById('mood-box').style.backgroundColor = `hsl(${moodData.hue}, 80%, 40%)`;
                document.getElementById('current-mood-icon').textContent = moodData.icon;
                document.getElementById('current-mood-text').textContent = "Chargement...";
            }

            async function refreshData() {
                const state = await fetchCurrentState();
                const remarks = (!state.errorState && state.hasRemarks) ? await fetchRemarksList() : [];
                updateCorrectionDisplay(state, CORRECTION_STEPS, MOODS, remarks);
                updateLastUpdated(state.fromCache);
            }

            document.addEventListener('DOMContentLoaded', async () => {
                initializeDisplay();
                await refreshData();
                setInterval(refreshData, 5 * 60 * 1000);
            });
        </script>
    </div>
</div>
